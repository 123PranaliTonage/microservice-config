server:
  port: 8085

spring:
  cloud:
    gateway:
      routes:

        - id: state-service
          uri: lb://state-service
          predicates:
            - Path=/api/states/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
      logging:
  level:
    org.springframework.cloud.gateway: DEBUG
