server:
  port: 8085

spring:
  cloud:
    gateway:
      mvc:
        routes:

          - id: state-service
            uri: lb://STATE-SERVICE
            predicates:
              - Path=/api/states/**

         - id: user-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
