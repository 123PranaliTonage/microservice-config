server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: state-service
          uri: lb://STATE-SERVICE
          predicates:
            - Path=/api/states/**

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
